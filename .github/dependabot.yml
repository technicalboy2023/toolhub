version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "next*"
          - "@next/*"
        update-types:
          - "minor"
          - "patch"
      typescript-types:
        patterns:
          - "@types/*"
        dependency-type: "development"
      styling:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "@tailwindcss/*"
          - "lucide-react"
          - "framer-motion"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
        update-types:
          - "minor"
          - "patch"
      linting-formatting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "@typescript-eslint/*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"